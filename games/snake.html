<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Snake — Spider-Net</title>
  <link rel="stylesheet" href="../subpage.css" />
  <style>
    .snake-wrap { text-align: center; }
    canvas {
      display: block;
      margin: 1rem auto;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0a0c10;
      max-width: 100%;
      height: auto;
    }
    .snake-hud {
      font-family: var(--mono);
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .snake-hud strong { color: var(--accent); }
  </style>
</head>
<body>
  <div class="subpage-top"><a class="back" href="../index.html">← Spider-Net</a></div>
  <main class="subpage-main">
    <h1>Snake</h1>
    <p class="lede">Arrow keys or swipe. Eat dots; don’t bite yourself or the wall.</p>
    <div class="card snake-wrap">
      <div class="snake-hud">Score <strong id="score">0</strong> · <kbd>Space</kbd> pause</div>
      <canvas id="c" width="400" height="400" aria-label="Snake game"></canvas>
      <p><button type="button" class="btn btn-primary" id="restart">Restart</button></p>
    </div>
  </main>
  <script>
(function () {
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const cell = 20;
  const cols = Math.floor(canvas.width / cell);
  const rows = Math.floor(canvas.height / cell);
  let snake, dir, nextDir, food, score, tick, paused, alive;

  function randCell() {
    return { x: Math.floor(Math.random() * cols), y: Math.floor(Math.random() * rows) };
  }

  function placeFood() {
    let p;
    do {
      p = randCell();
    } while (snake.some((s) => s.x === p.x && s.y === p.y));
    food = p;
  }

  function reset() {
    snake = [{ x: Math.floor(cols / 2), y: Math.floor(rows / 2) }];
    dir = { x: 1, y: 0 };
    nextDir = { ...dir };
    score = 0;
    tick = 0;
    paused = false;
    alive = true;
    scoreEl.textContent = "0";
    placeFood();
  }

  function step() {
    if (!alive || paused) return;
    tick++;
    if (tick % 6 !== 0) return;
    dir = { ...nextDir };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) {
      alive = false;
      return;
    }
    if (snake.some((s) => s.x === head.x && s.y === head.y)) {
      alive = false;
      return;
    }
    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score += 10;
      scoreEl.textContent = String(score);
      placeFood();
    } else {
      snake.pop();
    }
  }

  function draw() {
    ctx.fillStyle = "#0a0c10";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "rgba(126, 231, 135, 0.15)";
    for (let x = 0; x < cols; x++)
      for (let y = 0; y < rows; y++)
        if ((x + y) % 2 === 0) ctx.fillRect(x * cell, y * cell, cell, cell);
    ctx.fillStyle = "#ff6b6b";
    ctx.beginPath();
    ctx.arc(food.x * cell + cell / 2, food.y * cell + cell / 2, cell * 0.35, 0, Math.PI * 2);
    ctx.fill();
    snake.forEach((seg, i) => {
      ctx.fillStyle = i === 0 ? "#7ee787" : "rgba(126, 231, 135, 0.75)";
      const pad = i === 0 ? 1 : 2;
      ctx.fillRect(seg.x * cell + pad, seg.y * cell + pad, cell - pad * 2, cell - pad * 2);
    });
    if (!alive) {
      ctx.fillStyle = "rgba(0,0,0,0.65)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#e8ecf4";
      ctx.font = "bold 22px system-ui";
      ctx.textAlign = "center";
      ctx.fillText("Game over", canvas.width / 2, canvas.height / 2 - 8);
      ctx.font = "14px system-ui";
      ctx.fillStyle = "#8b95a8";
      ctx.fillText("Restart below", canvas.width / 2, canvas.height / 2 + 16);
    } else if (paused) {
      ctx.fillStyle = "rgba(0,0,0,0.5)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#e8ecf4";
      ctx.font = "bold 18px system-ui";
      ctx.textAlign = "center";
      ctx.fillText("Paused", canvas.width / 2, canvas.height / 2);
    }
  }

  function loop() {
    step();
    draw();
    requestAnimationFrame(loop);
  }

  const keyMap = {
    ArrowUp: { x: 0, y: -1 },
    ArrowDown: { x: 0, y: 1 },
    ArrowLeft: { x: -1, y: 0 },
    ArrowRight: { x: 1, y: 0 },
  };

  window.addEventListener("keydown", (e) => {
    if (e.code === "Space") {
      e.preventDefault();
      if (alive) paused = !paused;
      return;
    }
    const d = keyMap[e.key];
    if (!d) return;
    e.preventDefault();
    if (dir.x === -d.x && dir.y === -d.y) return;
    nextDir = d;
  });

  let touchStart = null;
  canvas.addEventListener(
    "touchstart",
    (e) => {
      const t = e.changedTouches[0];
      touchStart = { x: t.clientX, y: t.clientY };
    },
    { passive: true }
  );
  canvas.addEventListener(
    "touchend",
    (e) => {
      if (!touchStart) return;
      const t = e.changedTouches[0];
      const dx = t.clientX - touchStart.x;
      const dy = t.clientY - touchStart.y;
      touchStart = null;
      if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
      if (Math.abs(dx) > Math.abs(dy)) {
        const d = dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 };
        if (!(dir.x === -d.x && dir.y === -d.y)) nextDir = d;
      } else {
        const d = dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 };
        if (!(dir.x === -d.x && dir.y === -d.y)) nextDir = d;
      }
    },
    { passive: true }
  );

  document.getElementById("restart").addEventListener("click", () => {
    reset();
  });

  reset();
  loop();
})();
  </script>
</body>
</html>
