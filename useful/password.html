<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Password generator — Spider-Net</title>
  <link rel="stylesheet" href="../subpage.css" />
  <style>
    .pw-out {
      font-family: var(--mono);
      font-size: 0.95rem;
      padding: 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.45);
      word-break: break-all;
      margin: 1rem 0;
      min-height: 3rem;
    }
    .pw-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 0.65rem 0;
      flex-wrap: wrap;
    }
    .pw-row label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.88rem;
      cursor: pointer;
    }
    .pw-row input[type="range"] {
      flex: 1;
      min-width: 120px;
      accent-color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="subpage-top"><a class="back" href="../index.html">← Spider-Net</a></div>
  <main class="subpage-main">
    <h1>Password generator</h1>
    <p class="lede">Random strings from your browser’s crypto. Copy and store safely.</p>
    <div class="card">
      <div class="pw-out" id="out" aria-live="polite">—</div>
      <div class="pw-row">
        <span style="color: var(--muted); font-size: 0.85rem;">Length</span>
        <input type="range" id="len" min="12" max="48" value="20" />
        <span id="lenVal" style="font-family: var(--mono); color: var(--accent);">20</span>
      </div>
      <div class="pw-row">
        <label><input type="checkbox" id="upper" checked /> A–Z</label>
        <label><input type="checkbox" id="lower" checked /> a–z</label>
        <label><input type="checkbox" id="nums" checked /> 0–9</label>
        <label><input type="checkbox" id="sym" checked /> !@#$…</label>
      </div>
      <div class="pw-row">
        <button type="button" class="btn btn-primary" id="gen">Generate</button>
        <button type="button" class="btn" id="copy">Copy</button>
      </div>
    </div>
  </main>
  <script>
(function () {
  const out = document.getElementById("out");
  const lenEl = document.getElementById("len");
  const lenVal = document.getElementById("lenVal");
  const upper = document.getElementById("upper");
  const lower = document.getElementById("lower");
  const nums = document.getElementById("nums");
  const sym = document.getElementById("sym");

  function charset() {
    let s = "";
    if (upper.checked) s += "ABCDEFGHJKLMNPQRSTUVWXYZ";
    if (lower.checked) s += "abcdefghijkmnopqrstuvwxyz";
    if (nums.checked) s += "23456789";
    if (sym.checked) s += "!@#$%&*-_=+?";
    return s;
  }

  function generate() {
    const chars = charset();
    if (!chars.length) {
      out.textContent = "Pick at least one character set.";
      return;
    }
    const n = Number(lenEl.value);
    const bytes = new Uint8Array(n);
    crypto.getRandomValues(bytes);
    let pwd = "";
    for (let i = 0; i < n; i++) pwd += chars[bytes[i] % chars.length];
    out.textContent = pwd;
  }

  lenEl.addEventListener("input", () => {
    lenVal.textContent = lenEl.value;
  });

  document.getElementById("gen").addEventListener("click", generate);
  document.getElementById("copy").addEventListener("click", async () => {
    const t = out.textContent;
    if (!t || t === "—" || t.startsWith("Pick")) return;
    try {
      await navigator.clipboard.writeText(t);
      document.getElementById("copy").textContent = "Copied";
      setTimeout(() => {
        document.getElementById("copy").textContent = "Copy";
      }, 1500);
    } catch (_) {}
  });

  generate();
})();
  </script>
</body>
</html>
